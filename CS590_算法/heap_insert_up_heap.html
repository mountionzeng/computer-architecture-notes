<div style="display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;">
  <button onclick="ins(0)" id="i0" style="padding: 6px 12px;">①末尾插入</button>
  <button onclick="ins(1)" id="i1" style="padding: 6px 12px;">②上浮</button>
  <button onclick="ins(2)" id="i2" style="padding: 6px 12px;">③再上浮</button>
  <button onclick="ins(3)" id="i3" style="padding: 6px 12px;">④到根</button>
</div>

<svg id="ins-svg" width="100%" viewBox="0 0 680 380" role="img">
<title>Up-heap insertion</title>
<desc>Insert new element at end then swap with parent until heap order is restored.</desc>
</svg>

<div id="ins-log" style="background: var(--color-background-secondary); border-radius: 8px; padding: 14px 16px; font-size: 13px; min-height: 100px; margin-top: 12px;"></div>

<script>
const isvg = document.getElementById('ins-svg');
const ilog = document.getElementById('ins-log');

function inode(x, y, val, color, idx, r=22) {
  return `<g class="c-${color}"><circle cx="${x}" cy="${y}" r="${r}" stroke-width="${color==='red'||color==='amber'?1.5:0.5}"/><text class="th" x="${x}" y="${y}" text-anchor="middle" dominant-baseline="central">${val}</text></g><text class="ts" x="${x+r+8}" y="${y-r+12}" fill="#888780">[${idx}]</text>`;
}
function ied(x1,y1,x2,y2,c='#888780') {
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${c}" stroke-width="1"/>`;
}

function ins(s) {
  for(let i=0;i<4;i++) document.getElementById('i'+i).style.fontWeight = i===s?'500':'400';
  
  let svg = '';
  let log = '';
  
  if (s === 0) {
    svg += ied(340,90,220,180);
    svg += ied(340,90,460,180);
    svg += ied(220,200,160,290);
    svg += ied(220,200,280,290);
    svg += ied(460,200,400,290);
    
    svg += inode(340,90,'3','gray',1);
    svg += inode(220,180,'7','gray',2);
    svg += inode(460,180,'5','gray',3);
    svg += inode(160,290,'9','gray',4,18);
    svg += inode(280,290,'8','gray',5,18);
    svg += inode(400,290,'6','red',6,18);
    
    svg += `<text class="ts" x="430" y="300" fill="#A32D2D" font-weight="500">↑ 新元素 2 想插入</text>`;
    svg += `<text class="ts" x="430" y="320" fill="#A32D2D">先放末尾索引[6]</text>`;
    svg += `<text class="ts" x="540" y="290" fill="#A32D2D" font-weight="500" style="font-size:14px">原本是2!</text>`;
    
    svg = svg.replace('>6<', '>2<');
    
    log = `<strong>① 插入新元素 2</strong><br>
    第一步永远是<strong>挂到末尾</strong>——这样形状（完全二叉树）不会被破坏。<br>
    <span style="color: var(--color-text-tertiary); font-size: 12px;">代码：array[++size] = 2</span><br>
    但是 2 比它父亲 5 小——<strong>违反了堆序</strong>！需要修复。`;
  } else if (s === 1) {
    svg += ied(340,90,220,180);
    svg += ied(340,90,460,180,'#A32D2D');
    svg += ied(220,200,160,290);
    svg += ied(220,200,280,290);
    svg += ied(460,200,400,290,'#A32D2D');
    
    svg += inode(340,90,'3','gray',1);
    svg += inode(220,180,'7','gray',2);
    svg += inode(460,180,'2','teal',3);
    svg += inode(160,290,'9','gray',4,18);
    svg += inode(280,290,'8','gray',5,18);
    svg += inode(400,290,'5','amber',6,18);
    
    svg += `<text class="ts" x="540" y="200" fill="#0F6E56" font-weight="500">2 上浮 ↑</text>`;
    svg += `<text class="ts" x="540" y="220" fill="#0F6E56">和父亲 5 交换</text>`;
    
    log = `<strong>② 上浮第一步</strong><br>
    比较 2 和它父亲 5：<strong>2 &lt; 5，违反堆序</strong>，所以 <strong>swap(2, 5)</strong>。<br>
    <span style="color: var(--color-text-tertiary); font-size: 12px;">代码：if array[i] &lt; array[i/2]: swap(i, i/2); i = i/2</span><br>
    现在 2 来到了索引 [3]，它的父亲是根 [1] = 3。继续比较。`;
  } else if (s === 2) {
    svg += ied(340,90,220,180);
    svg += ied(340,90,460,180,'#A32D2D');
    svg += ied(220,200,160,290);
    svg += ied(220,200,280,290);
    svg += ied(460,200,400,290);
    
    svg += inode(340,90,'2','teal',1);
    svg += inode(220,180,'7','gray',2);
    svg += inode(460,180,'3','amber',3);
    svg += inode(160,290,'9','gray',4,18);
    svg += inode(280,290,'8','gray',5,18);
    svg += inode(400,290,'5','gray',6,18);
    
    svg += `<text class="ts" x="540" y="120" fill="#0F6E56" font-weight="500">2 继续上浮 ↑</text>`;
    svg += `<text class="ts" x="540" y="140" fill="#0F6E56">和父亲 3 交换</text>`;
    
    log = `<strong>③ 上浮第二步</strong><br>
    现在比较 2 和父亲 3：<strong>2 &lt; 3，仍违反</strong>，所以 swap(2, 3)。<br>
    2 终于到了根的位置 [1]。`;
  } else {
    svg += ied(340,90,220,180);
    svg += ied(340,90,460,180);
    svg += ied(220,200,160,290);
    svg += ied(220,200,280,290);
    svg += ied(460,200,400,290);
    
    svg += inode(340,90,'2','teal',1);
    svg += inode(220,180,'7','gray',2);
    svg += inode(460,180,'3','gray',3);
    svg += inode(160,290,'9','gray',4,18);
    svg += inode(280,290,'8','gray',5,18);
    svg += inode(400,290,'5','gray',6,18);
    
    svg += `<text class="ts" x="430" y="100" fill="#0F6E56" font-weight="500">✓ 修复完成</text>`;
    svg += `<text class="ts" x="430" y="120" fill="#0F6E56">2 已是根，所有节点 ≤ 孩子</text>`;
    
    log = `<strong>④ 修复结束</strong><br>
    2 成为新的根（最小元素）。整棵树重新满足堆序。<br>
    <strong>整个 insert 走过的路径长度 = 树高 = log n</strong>，所以是 <strong>O(log n)</strong>。<br>
    <span style="color: var(--color-text-tertiary); font-size: 12px;">注意 2 不一定能浮到根——只要碰到一个父亲 ≤ 自己就停下。这里恰好它一直是最小所以浮到顶。</span>`;
  }
  
  isvg.innerHTML = svg;
  ilog.innerHTML = log;
}

ins(0);
</script>
