<div style="font-family: -apple-system, BlinkMacSystemFont, sans-serif;">
<div style="display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;">
  <button onclick="kStep(0)" id="kb0" style="padding: 6px 12px;">①初始化</button>
  <button onclick="kStep(1)" id="kb1" style="padding: 6px 12px;">②加入物品1 (w=2,v=3)</button>
  <button onclick="kStep(2)" id="kb2" style="padding: 6px 12px;">③加入物品2 (w=3,v=4)</button>
  <button onclick="kStep(3)" id="kb3" style="padding: 6px 12px;">④加入物品3 (w=4,v=5)</button>
  <button onclick="kStep(4)" id="kb4" style="padding: 6px 12px;">⑤加入物品4 (w=5,v=6)</button>
  <button onclick="kStep(5)" id="kb5" style="padding: 6px 12px;">⑥回溯最优解</button>
</div>

<div style="margin-bottom: 12px; font-size: 14px;">
  <strong>问题</strong>：背包容量 W=5，物品：(w=2,v=3), (w=3,v=4), (w=4,v=5), (w=5,v=6)。求最大价值。<br>
  <strong>状态</strong>：<code>dp[i][w]</code> = 前 i 个物品、容量为 w 时的最大价值<br>
  <strong>转移</strong>：<code>dp[i][w] = max(dp[i-1][w], dp[i-1][w-w_i] + v_i)</code>
</div>

<svg id="k-svg" width="100%" viewBox="0 0 720 360" role="img">
<title>0-1 Knapsack DP table fill</title>
</svg>

<div id="k-log" style="background: #F5F4EE; border-radius: 8px; padding: 14px 16px; font-size: 13px; min-height: 120px; margin-top: 12px; line-height: 1.6;"></div>
</div>

<script>
const ksvg = document.getElementById('k-svg');
const klog = document.getElementById('k-log');

const items = [
  {w:2, v:3, name:'物品1'},
  {w:3, v:4, name:'物品2'},
  {w:4, v:5, name:'物品3'},
  {w:5, v:6, name:'物品4'}
];
const W = 5;

// dp[i][w], i 从 0..4, w 从 0..5
const dp = [[0,0,0,0,0,0]];
for (let i = 1; i <= 4; i++) {
  const row = [];
  for (let w = 0; w <= W; w++) {
    if (w < items[i-1].w) row.push(dp[i-1][w]);
    else row.push(Math.max(dp[i-1][w], dp[i-1][w-items[i-1].w] + items[i-1].v));
  }
  dp.push(row);
}

// trace optimal: items taken
function tracePath() {
  let i = 4, w = W;
  const path = [];
  while (i > 0 && w > 0) {
    if (dp[i][w] !== dp[i-1][w]) {
      path.push({i, w});
      w -= items[i-1].w;
    }
    i--;
  }
  return path;
}

function kStep(s) {
  for (let i = 0; i < 6; i++) document.getElementById('kb'+i).style.fontWeight = i===s ? '600' : '400';

  const cellW = 60, cellH = 40, x0 = 140, y0 = 60;
  let svg = '';

  // header row: capacity 0..5
  svg += `<text x="${x0/2}" y="${y0-10}" text-anchor="middle" font-size="12" fill="#666">i \\ w</text>`;
  for (let w = 0; w <= W; w++) {
    svg += `<text x="${x0 + cellW*w + cellW/2}" y="${y0-10}" text-anchor="middle" font-size="13" fill="#444">w=${w}</text>`;
  }

  // row labels
  const rowLabels = ['dp[0]', 'dp[1] +物品1', 'dp[2] +物品2', 'dp[3] +物品3', 'dp[4] +物品4'];
  for (let i = 0; i <= 4; i++) {
    svg += `<text x="${x0 - 10}" y="${y0 + cellH*i + cellH/2 + 4}" text-anchor="end" font-size="12" fill="#444">${rowLabels[i]}</text>`;
  }

  // cells
  const filledRows = s; // step s fills row s (0 = init only row 0)
  const path = (s === 5) ? tracePath() : [];

  for (let i = 0; i <= 4; i++) {
    for (let w = 0; w <= W; w++) {
      const x = x0 + cellW*w;
      const y = y0 + cellH*i;
      let fill = '#F1EFE8', stroke = '#888780', textColor = '#888';
      let val = '';

      if (i <= filledRows) {
        val = dp[i][w];
        fill = '#FAF3DC'; stroke = '#CCB570'; textColor = '#444';
        // highlight just-filled row
        if (i === filledRows && filledRows > 0) {
          fill = '#FAC775'; stroke = '#854F0B'; textColor = '#222';
        }
      }

      // optimal trace
      if (path.find(p => p.i === i && p.w === w)) {
        fill = '#9FE1CB'; stroke = '#0F6E56'; textColor = '#0a4a3a';
      }

      svg += `<rect x="${x}" y="${y}" width="${cellW}" height="${cellH}" fill="${fill}" stroke="${stroke}" stroke-width="0.8"/>`;
      svg += `<text x="${x + cellW/2}" y="${y + cellH/2 + 4}" text-anchor="middle" font-size="14" fill="${textColor}" font-weight="${i === filledRows && filledRows > 0 ? '600' : '400'}">${val}</text>`;
    }
  }

  ksvg.innerHTML = svg;

  // log
  let log = '';
  if (s === 0) {
    log = '<strong>初始化</strong>：dp[0][w] = 0（不放任何物品 → 价值 0）。所有其他单元待计算。<br><span style="color:#666">这一行是边界条件，所有后续行的递推起点。</span>';
  } else if (s >= 1 && s <= 4) {
    const it = items[s-1];
    let detail = `<strong>加入物品 ${s}</strong>（w=${it.w}, v=${it.v}）：<br>对每个容量 w，比较：<br>`;
    detail += `&nbsp;&nbsp;<strong>不拿</strong> = dp[${s-1}][w]<br>`;
    detail += `&nbsp;&nbsp;<strong>拿</strong> = dp[${s-1}][w-${it.w}] + ${it.v}（仅当 w ≥ ${it.w}）<br>`;
    detail += `<span style="color:#666">取较大者。本行结果：[${dp[s].join(', ')}]</span>`;
    log = detail;
  } else {
    const path = tracePath();
    const taken = path.map(p => p.i).reverse();
    log = `<strong>最优解 = dp[4][5] = ${dp[4][W]}</strong><br>回溯路径（绿色单元）：从右下角看 dp[i][w] 是否等于 dp[i-1][w]。<br>&nbsp;&nbsp;不等 → 选了物品 i → 跳到 dp[i-1][w-w_i]<br>&nbsp;&nbsp;相等 → 没选物品 i → 跳到 dp[i-1][w]<br><strong>选中物品</strong>：${taken.map(i => `物品${i}`).join(' + ')}<br><span style="color:#666">→ 总重 ${taken.reduce((s,i) => s+items[i-1].w, 0)}，总价值 ${taken.reduce((s,i) => s+items[i-1].v, 0)}</span><br><br><strong style="color:#993C1D">为什么滚动数组要倒序？</strong> 用一维 dp[w]，dp[w] 的更新依赖 dp[w-w_i]（上一行的旧值）。若正序遍历，dp[w-w_i] 已被更新成"本行的新值"，等于把同一物品取了两次。倒序遍历时 dp[w-w_i] 还是旧值，符合 0-1 语义。`;
  }
  klog.innerHTML = log;
}

kStep(0);
</script>
