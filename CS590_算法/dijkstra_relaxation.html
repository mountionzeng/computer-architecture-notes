<div style="font-family: -apple-system, BlinkMacSystemFont, sans-serif;">
<div style="display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap;">
  <button onclick="dStep(0)" id="db0" style="padding: 6px 12px;">①初始</button>
  <button onclick="dStep(1)" id="db1" style="padding: 6px 12px;">②弹A,松弛邻居</button>
  <button onclick="dStep(2)" id="db2" style="padding: 6px 12px;">③弹B,松弛C,D</button>
  <button onclick="dStep(3)" id="db3" style="padding: 6px 12px;">④弹C,松弛D</button>
  <button onclick="dStep(4)" id="db4" style="padding: 6px 12px;">⑤弹D完成</button>
  <button onclick="dStep(5)" id="db5" style="padding: 6px 12px;">⑥最短路径树</button>
</div>

<div style="margin-bottom: 12px; font-size: 14px;">
  <strong>图</strong>：4 节点 A B C D，边权见图。<strong>源点 A</strong>。<br>
  <strong>不变量</strong>：从优先队列弹出的节点（首次见到时），其 dist 值已是最终答案，永不再变。
</div>

<svg id="d-svg" width="100%" viewBox="0 0 720 380" role="img">
<title>Dijkstra relaxation step-by-step</title>
<defs>
  <marker id="d-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round"/>
  </marker>
</defs>
</svg>

<div id="d-log" style="background: #F5F4EE; border-radius: 8px; padding: 14px 16px; font-size: 13px; min-height: 160px; margin-top: 12px; line-height: 1.6;"></div>
</div>

<script>
const dsvg = document.getElementById('d-svg');
const dlog = document.getElementById('d-log');

// node positions
const nodes = {
  A: {x: 120, y: 200, label: 'A'},
  B: {x: 320, y: 100, label: 'B'},
  C: {x: 320, y: 300, label: 'C'},
  D: {x: 540, y: 200, label: 'D'}
};
const edges = [
  {u:'A', v:'B', w:1},
  {u:'A', v:'C', w:4},
  {u:'B', v:'C', w:2},
  {u:'B', v:'D', w:5},
  {u:'C', v:'D', w:1}
];

// states per step:
// dist, finalized (永久确定的节点), pq snapshot, just-relaxed edges, popped node
const states = [
  {dist:{A:0,B:'∞',C:'∞',D:'∞'}, finalized:[], pq:[['0','A']], popped:null, relaxed:[]},
  {dist:{A:0,B:1,C:4,D:'∞'},     finalized:['A'], pq:[['1','B'],['4','C']], popped:'A', relaxed:[['A','B'],['A','C']]},
  {dist:{A:0,B:1,C:3,D:6},       finalized:['A','B'], pq:[['3','C'],['4','C*'],['6','D']], popped:'B', relaxed:[['B','C'],['B','D']]},
  {dist:{A:0,B:1,C:3,D:4},       finalized:['A','B','C'], pq:[['4','C* 过期'],['4','D'],['6','D* 过期']], popped:'C', relaxed:[['C','D']]},
  {dist:{A:0,B:1,C:3,D:4},       finalized:['A','B','C','D'], pq:[], popped:'D', relaxed:[]},
  {dist:{A:0,B:1,C:3,D:4},       finalized:['A','B','C','D'], pq:[], popped:null, relaxed:[], showTree:true}
];

const treeEdges = [['A','B'],['B','C'],['C','D']]; // shortest path tree

function dStep(s) {
  for (let i = 0; i < 6; i++) document.getElementById('db'+i).style.fontWeight = i===s ? '600' : '400';

  const st = states[s];
  let svg = `<defs>
    <marker id="d-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>`;

  // edges
  for (const e of edges) {
    const a = nodes[e.u], b = nodes[e.v];
    const isRelaxed = st.relaxed.find(r => r[0]===e.u && r[1]===e.v);
    const isTree = st.showTree && treeEdges.find(t => (t[0]===e.u && t[1]===e.v) || (t[0]===e.v && t[1]===e.u));
    let stroke = '#888780', sw = 1.5;
    if (isRelaxed) { stroke = '#185FA5'; sw = 3; }
    if (isTree) { stroke = '#0F6E56'; sw = 3; }
    svg += `<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="${stroke}" stroke-width="${sw}"/>`;
    // weight label
    const mx = (a.x+b.x)/2, my = (a.y+b.y)/2;
    svg += `<rect x="${mx-12}" y="${my-10}" width="24" height="20" fill="white" stroke="#aaa" rx="3"/>`;
    svg += `<text x="${mx}" y="${my+5}" text-anchor="middle" font-size="13" fill="#444">${e.w}</text>`;
  }

  // nodes
  for (const k in nodes) {
    const n = nodes[k];
    const isPopped = st.popped === k;
    const isFinal = st.finalized.includes(k);
    let fill = '#F1EFE8', stroke = '#888780', sw = 1.5;
    if (isFinal) { fill = '#9FE1CB'; stroke = '#0F6E56'; sw = 2; }
    if (isPopped) { fill = '#FAC775'; stroke = '#854F0B'; sw = 2.5; }
    svg += `<circle cx="${n.x}" cy="${n.y}" r="26" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;
    svg += `<text x="${n.x}" y="${n.y+5}" text-anchor="middle" font-size="16" font-weight="600">${n.label}</text>`;
    // dist label
    const d = st.dist[k];
    svg += `<text x="${n.x}" y="${n.y-38}" text-anchor="middle" font-size="13" fill="#185FA5" font-weight="600">dist=${d}</text>`;
  }

  // PQ display
  svg += `<text x="640" y="40" font-size="13" font-weight="600" fill="#444">优先队列</text>`;
  if (st.pq.length === 0) {
    svg += `<text x="640" y="65" font-size="12" fill="#888">（空）</text>`;
  } else {
    st.pq.forEach((item, i) => {
      const isStale = item[1].includes('*');
      svg += `<rect x="610" y="${50 + i*26}" width="80" height="22" fill="${isStale ? '#F0D5D5' : '#E8F0FA'}" stroke="${isStale ? '#A32D2D' : '#185FA5'}" rx="3"/>`;
      svg += `<text x="650" y="${66 + i*26}" text-anchor="middle" font-size="12" fill="${isStale ? '#A32D2D' : '#185FA5'}">(${item[0]}, ${item[1]})</text>`;
    });
  }

  dsvg.innerHTML = svg;

  // log
  let log = '';
  if (s === 0) {
    log = `<strong>初始化</strong>：dist[A]=0，其余 = ∞。PQ = [(0, A)]。<br><span style="color:#666">PQ 中存的是 (距离估计, 节点) 二元组，按距离升序。</span>`;
  } else if (s === 1) {
    log = `<strong>弹出 A（dist=0）</strong>，A 被永久确定。<br>松弛 A 的两条出边：<br>&nbsp;&nbsp;A→B(1)：dist[B] = 0+1 = 1，PQ 加入 (1, B)<br>&nbsp;&nbsp;A→C(4)：dist[C] = 0+4 = 4，PQ 加入 (4, C)<br><span style="color:#666">PQ 现在 = [(1,B), (4,C)]</span>`;
  } else if (s === 2) {
    log = `<strong>弹出 B（dist=1）</strong>，B 被永久确定。<br>松弛 B 的两条出边：<br>&nbsp;&nbsp;B→C(2)：1+2=3 < 4 → dist[C] 更新为 3，PQ 加入 (3, C)<br>&nbsp;&nbsp;B→D(5)：1+5=6 < ∞ → dist[D]=6，PQ 加入 (6, D)<br><span style="color:#993C1D">注意</span>：旧的 (4, C) 还在 PQ 里没删——这就是<strong>过期项</strong>，等弹出时跳过即可。`;
  } else if (s === 3) {
    log = `<strong>弹出 (3, C)</strong>，dist[C]=3 与之相等 → 有效，C 被永久确定。<br>松弛 C 的出边：<br>&nbsp;&nbsp;C→D(1)：3+1=4 < 6 → dist[D] 更新为 4，PQ 加入 (4, D)<br><span style="color:#666">下一次弹出会先弹 (4, C)，但 dist[C]=3 ≠ 4 → 跳过过期项。</span>`;
  } else if (s === 4) {
    log = `<strong>弹出 (4, C 过期)</strong> → 跳过（dist[C] 已是 3，不等于 4）。<br><strong>弹出 (4, D)</strong>，D 被永久确定。<br>D 没有出边，松弛步空过。<br>剩下 (6, D 过期) 也会被跳过。<br><strong>算法结束。</strong>`;
  } else {
    log = `<strong>最短路径树</strong>（绿色边）：A→B→C→D，dist 分别 0, 1, 3, 4。<br><br><strong style="color:#A32D2D">为什么不能负权？</strong>Dijkstra 的正确性依赖"弹出即定终值"。如果有负权边 (X→A, -10)，A 弹出后还有可能因从 X 走过来变得更小，违反不变量。<br><br><strong>复杂度</strong>：O((V+E) log V)，每条边最多触发一次 PQ.push，每次 push/pop 是 O(log V)。`;
  }
  dlog.innerHTML = log;
}

dStep(0);
</script>
