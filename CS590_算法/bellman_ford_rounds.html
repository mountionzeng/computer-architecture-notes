<div style="font-family: -apple-system, BlinkMacSystemFont, sans-serif;">
<div style="display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap;">
  <button onclick="bStep(0)" id="bb0" style="padding: 6px 12px;">①初始</button>
  <button onclick="bStep(1)" id="bb1" style="padding: 6px 12px;">②第1轮</button>
  <button onclick="bStep(2)" id="bb2" style="padding: 6px 12px;">③第2轮</button>
  <button onclick="bStep(3)" id="bb3" style="padding: 6px 12px;">④第3轮</button>
  <button onclick="bStep(4)" id="bb4" style="padding: 6px 12px;">⑤第4轮</button>
  <button onclick="bStep(5)" id="bb5" style="padding: 6px 12px;">⑥第5轮(检测)</button>
</div>

<div style="margin-bottom: 12px; font-size: 14px;">
  <strong>图</strong>：链 A → B → C → D → E，所有边权 = 1。<strong>源 A，V=5</strong> → 需 V−1 = 4 轮。<br>
  <strong>边处理顺序</strong>（故意挑最坏的）：D→E, C→D, B→C, A→B（每轮按这个顺序扫一遍）<br>
  <strong>不变量</strong>：第 k 轮结束后，所有"经过 ≤ k 条边能到达的节点"的 dist 已正确。
</div>

<svg id="b-svg" width="100%" viewBox="0 0 720 280" role="img">
<title>Bellman-Ford rounds</title>
</svg>

<div id="b-log" style="background: #F5F4EE; border-radius: 8px; padding: 14px 16px; font-size: 13px; min-height: 180px; margin-top: 12px; line-height: 1.6;"></div>
</div>

<script>
const bsvg = document.getElementById('b-svg');
const blog = document.getElementById('b-log');

const nodes = [
  {k:'A', x:90, y:140},
  {k:'B', x:230, y:140},
  {k:'C', x:370, y:140},
  {k:'D', x:510, y:140},
  {k:'E', x:650, y:140}
];
const edges = [
  {u:'A', v:'B', w:1},
  {u:'B', v:'C', w:1},
  {u:'C', v:'D', w:1},
  {u:'D', v:'E', w:1}
];

// 边处理顺序（最坏顺序）：D→E, C→D, B→C, A→B
// 这种顺序需要 V-1=4 轮才能让信息从 A 传到 E
const distHistory = [
  {A:0,B:'∞',C:'∞',D:'∞',E:'∞'},   // 初始
  {A:0,B:1,C:'∞',D:'∞',E:'∞'},     // 第1轮：只 A→B 生效
  {A:0,B:1,C:2,D:'∞',E:'∞'},       // 第2轮：B→C 生效
  {A:0,B:1,C:2,D:3,E:'∞'},         // 第3轮：C→D 生效
  {A:0,B:1,C:2,D:3,E:4},           // 第4轮：D→E 生效
  {A:0,B:1,C:2,D:3,E:4}            // 第5轮：无变化 → 无负环
];

const updates = [
  [],
  [['A','B','0+1=1', '更新']],
  [['B','C','1+1=2', '更新']],
  [['C','D','2+1=3', '更新']],
  [['D','E','3+1=4', '更新']],
  []
];

function bStep(s) {
  for (let i = 0; i < 6; i++) document.getElementById('bb'+i).style.fontWeight = i===s ? '600' : '400';

  const dist = distHistory[s];
  const ups = updates[s];

  let svg = '';

  // edges
  for (const e of edges) {
    const a = nodes.find(n => n.k===e.u), b = nodes.find(n => n.k===e.v);
    const wasUpdated = ups.find(u => u[0]===e.u && u[1]===e.v);
    const stroke = wasUpdated ? '#185FA5' : '#888780';
    const sw = wasUpdated ? 3 : 1.5;
    // arrow
    svg += `<line x1="${a.x+26}" y1="${a.y}" x2="${b.x-26}" y2="${b.y}" stroke="${stroke}" stroke-width="${sw}" marker-end="url(#bf-arr)"/>`;
    const mx = (a.x+b.x)/2;
    svg += `<text x="${mx}" y="${a.y-12}" text-anchor="middle" font-size="13" fill="#444">${e.w}</text>`;
  }
  svg += `<defs><marker id="bf-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5"/></marker></defs>`;

  // nodes
  for (const n of nodes) {
    const updated = ups.find(u => u[1]===n.k);
    let fill = '#F1EFE8', stroke = '#888780';
    if (n.k === 'A') { fill = '#FAC775'; stroke = '#854F0B'; }
    if (updated) { fill = '#9FE1CB'; stroke = '#0F6E56'; }
    svg += `<circle cx="${n.x}" cy="${n.y}" r="26" fill="${fill}" stroke="${stroke}" stroke-width="2"/>`;
    svg += `<text x="${n.x}" y="${n.y+5}" text-anchor="middle" font-size="16" font-weight="600">${n.k}</text>`;
    svg += `<text x="${n.x}" y="${n.y+55}" text-anchor="middle" font-size="13" fill="#185FA5" font-weight="600">dist=${dist[n.k]}</text>`;
  }

  bsvg.innerHTML = svg;

  // log
  let log = '';
  if (s === 0) {
    log = `<strong>初始化</strong>：dist[A]=0，其余 = ∞。<br>每轮按固定顺序扫所有边：D→E → C→D → B→C → A→B（最坏顺序，故意演示为什么需要 V−1 轮）。`;
  } else if (s >= 1 && s <= 4) {
    const explanations = [
      `<strong>第 1 轮</strong> 扫 4 条边：<br>
       &nbsp;&nbsp;D→E(1)：∞+1=∞ → 不更新<br>
       &nbsp;&nbsp;C→D(1)：∞+1=∞ → 不更新<br>
       &nbsp;&nbsp;B→C(1)：∞+1=∞ → 不更新<br>
       &nbsp;&nbsp;<strong style="color:#0F6E56">A→B(1)：0+1=1</strong> → 更新！<br>
       <span style="color:#666">第 1 轮只有最后一条边能用，因为前三条的源节点 dist 还是 ∞。</span>`,
      `<strong>第 2 轮</strong> 扫 4 条边：<br>
       &nbsp;&nbsp;D→E：∞ → 不更新<br>
       &nbsp;&nbsp;C→D：∞ → 不更新<br>
       &nbsp;&nbsp;<strong style="color:#0F6E56">B→C(1)：1+1=2</strong> → 更新！<br>
       &nbsp;&nbsp;A→B：0+1=1，未变<br>
       <span style="color:#666">信息从 A 又前进了一步，到 C。</span>`,
      `<strong>第 3 轮</strong>：<br>
       &nbsp;&nbsp;D→E：∞ → 不更新<br>
       &nbsp;&nbsp;<strong style="color:#0F6E56">C→D(1)：2+1=3</strong> → 更新！<br>
       &nbsp;&nbsp;B→C, A→B：未变<br>
       <span style="color:#666">D 终于被赋值了。</span>`,
      `<strong>第 4 轮</strong>（V−1=4 的最后一轮）：<br>
       &nbsp;&nbsp;<strong style="color:#0F6E56">D→E(1)：3+1=4</strong> → 更新！<br>
       &nbsp;&nbsp;其余未变<br>
       <span style="color:#0F6E56;font-weight:600">所有节点都有了正确 dist。这就是为什么需要 V−1 = 4 轮。</span>`
    ];
    log = explanations[s-1];
  } else {
    log = `<strong>第 5 轮（验证）</strong>：再扫一遍所有边。<br>本轮没有任何 dist 被更新 → <strong style="color:#0F6E56">无负环</strong>。<br><br>
    <strong style="color:#A32D2D">如果有负环呢？</strong>第 V 轮还能更新 → 检测到负环 → 报错（不存在最短路）。<br><br>
    <strong>为什么 V−1 轮就够（无负环时）？</strong><br>
    最短路至多 V−1 条边（无负环时不会绕圈）。每"扫一遍所有边"至少把信息推进一条边的距离 → V−1 轮足以让信息从源传到任何节点。<br><br>
    <strong>复杂度</strong>：O(VE)，比 Dijkstra 慢，但<strong>能处理负权</strong>且能<strong>检测负环</strong>。`;
  }
  blog.innerHTML = log;
}

bStep(0);
</script>
